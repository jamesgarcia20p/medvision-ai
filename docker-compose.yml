services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medvision
      POSTGRES_PASSWORD: medvision
      POSTGRES_DB: medvision_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medvision -d medvision_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://medvision:medvision@postgres:5432/medvision_ai
      CORS_ORIGINS: http://localhost:3000
      STORAGE_PROVIDER: local
      LOCAL_STORAGE_PATH: /data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - upload-data:/data/uploads

  frontend:
    build: ./frontend
    environment:
      DATABASE_URL: postgresql://medvision:medvision@postgres:5432/medvision_ai
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_demo
      CLERK_SECRET_KEY: sk_test_demo
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  upload-data:
