<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Futuristic medical visualization reference artwork</title>
  <desc id="desc">A dark holographic medical dashboard inspired by the provided reference image, with anatomy, charts, and glowing interface panels.</desc>
  <defs>
